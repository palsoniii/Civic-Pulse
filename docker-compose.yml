networks:
  civicpulse_net:
    driver: bridge

volumes:
  pgdata-users:
  pgdata-complaints:
  pgdata-admin:
  pgdata-notifications:
  redisdata:
  minidata:

services:
  postgres-users:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${POSTGRES_USER:-civicpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicpulse_secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  postgres-complaints:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: complaints_db
      POSTGRES_USER: ${POSTGRES_USER:-civicpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicpulse_secret}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-complaints:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  postgres-admin:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: ${POSTGRES_USER:-civicpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicpulse_secret}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-admin:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  postgres-notifications:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: ${POSTGRES_USER:-civicpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicpulse_secret}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minidata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - civicpulse_net

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - civicpulse_net

  db-migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "
        apk add --no-cache openssl python3 make g++ &&
        npm ci &&
        cd apps/user-service &&
        DATABASE_URL=postgresql://civicpulse:civicpulse_secret@postgres-users:5432/users_db npx prisma migrate deploy --schema=./prisma/schema.prisma &&
        cd /app/apps/complaint-service &&
        DATABASE_URL=postgresql://civicpulse:civicpulse_secret@postgres-complaints:5432/complaints_db npx prisma migrate deploy --schema=./prisma/schema.prisma &&
        cd /app/apps/admin-service &&
        DATABASE_URL=postgresql://civicpulse:civicpulse_secret@postgres-admin:5432/admin_db npx prisma migrate deploy --schema=./prisma/schema.prisma &&
        cd /app/apps/notification-service &&
        DATABASE_URL=postgresql://civicpulse:civicpulse_secret@postgres-notifications:5432/notifications_db npx prisma migrate deploy --schema=./prisma/schema.prisma
      "
    depends_on:
      postgres-users:
        condition: service_healthy
      postgres-complaints:
        condition: service_healthy
      postgres-admin:
        condition: service_healthy
      postgres-notifications:
        condition: service_healthy
    networks:
      - civicpulse_net

  user-service:
    build:
      context: .
      dockerfile: infra/docker/user-service.Dockerfile
    env_file:
      - .env.user-service
    depends_on:
      redis:
        condition: service_healthy
      postgres-users:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/users/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  complaint-service:
    build:
      context: .
      dockerfile: infra/docker/complaint-service.Dockerfile
    env_file:
      - .env.complaint-service
    depends_on:
      redis:
        condition: service_healthy
      postgres-complaints:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/v1/complaints/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  admin-service:
    build:
      context: .
      dockerfile: infra/docker/admin-service.Dockerfile
    env_file:
      - .env.admin-service
    depends_on:
      redis:
        condition: service_healthy
      postgres-admin:
        condition: service_healthy
      complaint-service:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/api/v1/admin/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  notification-service:
    build:
      context: .
      dockerfile: infra/docker/notification-service.Dockerfile
    env_file:
      - .env.notification-service
    depends_on:
      redis:
        condition: service_healthy
      postgres-notifications:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/api/v1/notifications/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  media-service:
    build:
      context: .
      dockerfile: infra/docker/media-service.Dockerfile
    env_file:
      - .env.media-service
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/api/v1/media/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    env_file:
      - .env.gateway
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      complaint-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env.web
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - civicpulse_net
